<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оценки курсанта</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 0;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 70%;
      margin-right: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #667eea;
      color: white;
      padding: 12px;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    tr:hover {
      background-color: #f5f7ff;
    }

    .status {
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: bold;
    }

    .done {
      background: #d4edda;
      color: #155724;
    }

    .progress {
      background: #fff3cd;
      color: #856404;
    }

    .fail {
      background: #f8d7da;
      color: #721c24;
    }

    .loading, .error {
      text-align: center;
      margin-top: 20px;
      font-size: 18px;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>📊 Таблица оценок студента</h1>

    <!-- 🔐 Авторизация -->
    <div id="auth">
      <h2>Вход</h2>
      <input type="password" id="password" placeholder="Введите пароль" />
      <button onclick="login()">Войти</button>
      <div id="auth-error" class="error"></div>
    </div>

    <!-- 📊 Контент -->
    <div id="content" class="loading" style="display:none;">
      Загрузка данных...
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.8/dist/pocketbase.umd.js"></script>
  <script src="front.js"></script>

</body>
</html>
